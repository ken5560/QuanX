# iTunes 内购解锁 (buy.itunes.apple.com/verifyReceipt)
# 自动查询 App 内购产品并注入最贵套餐凭证
# BoxJS 订阅: https://raw.githubusercontent.com/ken5560/QuanX/refs/heads/master/scripts/reven.boxjs.json
# 可在 BoxJS [Reven iTunes 解锁设置] 中配置: iap_enabled / iap_expires / iap_country
[rewrite_local]
^https:\/\/buy\.itunes\.apple\.com\/verifyReceipt url script-analyze-echo-response https://reven.jsforbaby.workers.dev/reven/qx-itunes.js

[mitm]
hostname = buy.itunes.apple.com
